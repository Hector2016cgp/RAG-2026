{% extends 'base.html' %}

{% block title %}Registrarse - RAG Platform{% endblock %}

{% block main_class %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <i class="fas fa-user-plus text-blue-600 text-5xl mb-4"></i>
            <h2 class="text-3xl font-bold text-gray-900">Crear Cuenta</h2>
            <p class="mt-2 text-gray-600">Únete a RAG Platform</p>
        </div>
        
        <form method="post" action="{% url 'accounts:register' %}" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-1"></i> Usuario
                </label>
                <input 
                    type="text" 
                    name="username" 
                    id="username"
                    required
                    minlength="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="Elige un nombre de usuario"
                >
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-envelope mr-1"></i> Email
                </label>
                <input 
                    type="email" 
                    name="email" 
                    id="email"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="tu@email.com"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-1"></i> Contraseña
                </label>
                <input 
                    type="password" 
                    name="password" 
                    id="password"
                    required
                    minlength="8"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="Mínimo 8 caracteres"
                >
            </div>
            
            <div>
                <label for="password_confirm" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-1"></i> Confirmar Contraseña
                </label>
                <input 
                    type="password" 
                    name="password_confirm" 
                    id="password_confirm"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="Repite tu contraseña"
                >
            </div>
            
            <div>
                <button 
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-lg"
                >
                    <i class="fas fa-user-plus mr-2"></i> Registrarse
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-600">
                ¿Ya tienes cuenta? 
                <a href="{% url 'accounts:login' %}" class="text-blue-600 hover:text-blue-700 font-semibold">
                    Inicia sesión aquí
                </a>
            </p>
            <a href="{% url 'accounts:landing' %}" class="mt-4 inline-block text-gray-500 hover:text-gray-700">
                <i class="fas fa-arrow-left mr-1"></i> Volver al inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
